<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6fa3">
<title>hi 💖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ---------- foundation ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Fredoka", "Comic Sans MS", "Chalkboard SE", system-ui, sans-serif;
    color: #2d1b3a;
    background: linear-gradient(135deg, #ffd6e8 0%, #ffe5c9 35%, #fff7a8 60%, #c9f0ff 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    overflow: hidden;
  }

  /* slow drifting blob backdrop for ambient chaos */
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 60vw; height: 60vw;
    background: #ff85b3;
    top: -20vw; left: -20vw;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  body::after {
    width: 55vw; height: 55vw;
    background: #87dafe;
    bottom: -20vw; right: -20vw;
    animation: drift2 22s ease-in-out infinite alternate;
  }
  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(8vw, 6vw) scale(1.12); }
  }
  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-6vw, -8vw) scale(1.15); }
  }

  /* ---------- card ---------- */
  .card {
    position: relative;
    z-index: 1;
    width: min(92vw, 460px);
    max-height: 92dvh;
    overflow-y: auto;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 32px 26px;
    box-shadow:
      0 24px 70px rgba(255, 120, 170, 0.28),
      0 4px 12px rgba(0, 0, 0, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 0.9);
    text-align: center;
  }

  /* ---------- type ---------- */
  h1 {
    font-size: clamp(2rem, 8vw, 2.6rem);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .sub {
    font-size: 1.05rem;
    font-weight: 400;
    opacity: 0.78;
    margin-bottom: 28px;
  }
  .result-title {
    font-size: clamp(1.4rem, 5.5vw, 1.7rem);
    font-weight: 500;
    line-height: 1.35;
    margin: 18px 0 8px;
  }
  .result-meta {
    font-size: 0.95rem;
    opacity: 0.65;
    margin-bottom: 24px;
  }

  /* ---------- buttons ---------- */
  .btn {
    display: block;
    width: 100%;
    padding: 18px 20px;
    margin: 12px 0;
    font-family: inherit;
    font-size: 1.15rem;
    font-weight: 500;
    color: white;
    background: linear-gradient(135deg, #ff6fa3, #ff8559);
    border: none;
    border-radius: 22px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.2s ease;
    box-shadow: 0 8px 20px rgba(255, 100, 140, 0.4);
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { transform: translateY(2px) scale(0.97); box-shadow: 0 4px 10px rgba(255, 100, 140, 0.4); }
  .btn:hover { filter: brightness(1.05); }
  .btn.taco { background: linear-gradient(135deg, #b06bff, #ff6fa3); box-shadow: 0 8px 20px rgba(176, 107, 255, 0.4); }
  .btn.ghost {
    background: transparent;
    color: #2d1b3a;
    box-shadow: none;
    border: 2px solid rgba(45, 27, 58, 0.18);
    font-weight: 400;
  }
  .btn.ghost:active { transform: translateY(1px) scale(0.98); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { margin: 0; }

  /* ---------- emoji vibes ---------- */
  .big-emoji {
    font-size: clamp(4rem, 18vw, 6rem);
    display: block;
    margin: 4px 0 6px;
    animation: wiggle 2.4s ease-in-out infinite;
    transform-origin: 50% 80%;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-6deg); }
    50%      { transform: rotate(6deg); }
  }

  /* ---------- screens ---------- */
  .screen { display: none; }
  .screen.active { display: block; animation: pop 0.35s cubic-bezier(.2, .9, .3, 1.3); }
  @keyframes pop {
    from { transform: scale(0.92); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ---------- result card ---------- */
  .result-emoji {
    font-size: clamp(3.5rem, 14vw, 5rem);
    display: block;
    margin-bottom: 6px;
  }

  /* ---------- footer ---------- */
  .footer {
    margin-top: 24px;
    font-size: 0.85rem;
    opacity: 0.55;
  }
  .footer span { font-weight: 500; }

  /* ---------- confetti ---------- */
  .confetti-wrap {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 10;
  }
  .confetti {
    position: absolute; top: -20px;
    width: 10px; height: 14px; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="confetti-wrap" id="confettiWrap" aria-hidden="true"></div>

  <main class="card" id="card">
    <!-- HOME -->
    <section class="screen active" id="screenHome" aria-label="home">
      <span class="big-emoji">💖</span>
      <h1>hi, you</h1>
      <p class="sub">i made you a little thing.<br>pick one.</p>
      <button class="btn"      onclick="rollDate()">surprise me 💘</button>
      <button class="btn taco" onclick="findTacoBell()">find me taco bell 🌮</button>
      <p class="footer">made with too much love &amp; bad ideas <span>·</span> by yours truly</p>
    </section>

    <!-- DATE RESULT -->
    <section class="screen" id="screenDate" aria-label="date suggestion">
      <span class="result-emoji" id="dateEmoji">✨</span>
      <p class="sub">your assignment, should you choose to accept it:</p>
      <p class="result-title" id="dateText">…</p>
      <p class="result-meta" id="dateMeta">tap below to roll again or chicken out</p>
      <button class="btn" onclick="rollDate()">again, please 🎲</button>
      <button class="btn ghost" onclick="goHome()">back</button>
    </section>

    <!-- TACO BELL RESULT -->
    <section class="screen" id="screenTaco" aria-label="taco bell finder">
      <span class="result-emoji" id="tacoEmoji">🌮</span>
      <p class="result-title" id="tacoTitle">finding your nearest taco bell…</p>
      <p class="result-meta" id="tacoMeta"></p>
      <div id="tacoActions"></div>
      <button class="btn ghost" onclick="goHome()" style="margin-top: 12px;">back</button>
    </section>
  </main>

<script>
/* ---------- date ideas (weighted by time of day) ---------- */
/* slots: m=morning (5-11), a=afternoon (12-17), e=evening (18-22), l=late (23-4); "any" = always eligible */
const DATE_IDEAS = [
  // any-time
  { text: "split a single milkshake at a diner",                                              emoji: "🥤", slots: ["a", "e", "l"] },
  { text: "trade phones for an hour and pick songs for each other",                           emoji: "🎵", slots: ["any"]        },
  { text: "go to a thrift store and buy each other the dumbest thing under $10",              emoji: "👕", slots: ["a"]          },
  { text: "pillow fort + the worst movie you can find + bad snacks",                          emoji: "🛋️", slots: ["e", "l"]     },
  { text: "find the longest wikipedia rabbit hole — winner picks dinner",                     emoji: "🐇", slots: ["any"]        },
  { text: "read each other tarot cards even though neither of you believe in it",             emoji: "🔮", slots: ["e", "l"]     },
  { text: "co-write a one-page short story, one sentence each, no editing",                   emoji: "✍️", slots: ["any"]        },
  { text: "face mask + cucumber slices + chaotic spa playlist",                               emoji: "🧖", slots: ["e"]          },
  { text: "mario kart, loser does dishes for a week",                                         emoji: "🏁", slots: ["any"]        },
  { text: "make a playlist of songs that remind you of each other. no skips.",                emoji: "💿", slots: ["any"]        },
  { text: "20 questions about each other. you have to learn ONE actually new thing.",         emoji: "❓", slots: ["any"]        },
  { text: "show each other the weirdest pics in your camera roll. no judgement.",             emoji: "📷", slots: ["any"]        },
  { text: "facetime your parents together. yes really.",                                      emoji: "📞", slots: ["a", "e"]     },
  { text: "go on a snack run with no plan and come back with at least one bizarre item",      emoji: "🍿", slots: ["e", "l"]     },

  // morning-ish
  { text: "pancakes from scratch — read the recipe wrong on purpose",                         emoji: "🥞", slots: ["m"]          },
  { text: "drive somewhere with no destination, turn around when the song ends",              emoji: "🚗", slots: ["m", "a"]     },
  { text: "world's longest hug. start a timer.",                                              emoji: "🫂", slots: ["m", "any"]   },
  { text: "go to a coffee shop neither of you have ever been to",                             emoji: "☕", slots: ["m", "a"]     },
  { text: "read each other your horoscopes in the most dramatic voice possible",              emoji: "🌟", slots: ["m"]          },

  // afternoon
  { text: "museum trip — make up the plot of every painting out loud",                        emoji: "🖼️", slots: ["a"]          },
  { text: "go for a walk and try to spot five genuinely weird things",                        emoji: "🚶", slots: ["a"]          },
  { text: "bookstore date: buy each other a book based on the cover only",                    emoji: "📚", slots: ["a"]          },
  { text: "rent a kayak / paddleboat / something that floats",                                emoji: "🚣", slots: ["a"]          },
  { text: "botanical garden or random park, find one plant nobody has ever heard of",         emoji: "🌿", slots: ["a"]          },

  // evening
  { text: "cook something neither of you has made before. no recipes allowed.",               emoji: "🍳", slots: ["e"]          },
  { text: "go to a bar and order each other's drinks",                                        emoji: "🍸", slots: ["e", "l"]     },
  { text: "stargazing — roof, parking lot, or drive out somewhere darker",                    emoji: "🌌", slots: ["e", "l"]     },
  { text: "fancy outfits, mcdonalds drive-thru",                                              emoji: "🍔", slots: ["e", "l"]     },
  { text: "karaoke. there is no opting out.",                                                 emoji: "🎤", slots: ["e", "l"]     },
  { text: "dance to exactly one song in the kitchen",                                         emoji: "💃", slots: ["e"]          },
  { text: "candlelit dinner from whatever's already in the fridge",                           emoji: "🕯️", slots: ["e"]          },

  // late-night
  { text: "taco bell drive-thru at 1am. yes. you knew this was coming.",                      emoji: "🌮", slots: ["l"]          },
  { text: "24-hour diner. order pancakes. tip the server well.",                              emoji: "🍳", slots: ["l"]          },
  { text: "stay up to watch the sunrise together. yes you have to. yes it counts.",           emoji: "🌅", slots: ["l"]          },
  { text: "blanket fort + scary podcast + holding each other a little too tight",             emoji: "🎙️", slots: ["l"]          },
];

function currentSlot() {
  const h = new Date().getHours();
  if (h >= 5  && h < 12) return "m";
  if (h >= 12 && h < 18) return "a";
  if (h >= 18 && h < 23) return "e";
  return "l";
}

function pickDateIdea() {
  const slot = currentSlot();
  const buckets = [];
  for (const idea of DATE_IDEAS) {
    // weight: in-slot picks weighted 3x, "any" picks 2x, off-slot 1x
    let w = 1;
    if (idea.slots.includes(slot)) w = 3;
    else if (idea.slots.includes("any")) w = 2;
    for (let i = 0; i < w; i++) buckets.push(idea);
  }
  return buckets[Math.floor(Math.random() * buckets.length)];
}

/* ---------- screens ---------- */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goHome() { show("screenHome"); }

/* ---------- date roll ---------- */
let lastDateIdx = -1;
function rollDate() {
  let idea;
  // avoid repeating the exact same idea twice in a row
  for (let tries = 0; tries < 6; tries++) {
    idea = pickDateIdea();
    if (idea.text !== document.getElementById("dateText").textContent) break;
  }
  document.getElementById("dateEmoji").textContent = idea.emoji;
  document.getElementById("dateText").textContent = idea.text;
  show("screenDate");
  burstConfetti();
}

/* ---------- taco bell finder ---------- */
function findTacoBell() {
  show("screenTaco");
  document.getElementById("tacoEmoji").textContent = "📡";
  document.getElementById("tacoTitle").textContent = "asking your phone where you are…";
  document.getElementById("tacoMeta").textContent = "(say yes to the location prompt 🥺)";
  document.getElementById("tacoActions").innerHTML = "";

  if (!navigator.geolocation) {
    return tacoFail("your browser doesn't do location.<br>i'm shocked, honestly.");
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => queryTacoBells(pos.coords.latitude, pos.coords.longitude),
    (err) => {
      const msg = err.code === err.PERMISSION_DENIED
        ? "ok ouch. you denied the location prompt.<br>no tacos for the suspicious. 🙄"
        : "couldn't figure out where you are.<br>are you in a faraday cage??";
      tacoFail(msg);
    },
    { enableHighAccuracy: false, timeout: 12000, maximumAge: 60000 }
  );
}

async function queryTacoBells(lat, lon) {
  document.getElementById("tacoEmoji").textContent = "🔍";
  document.getElementById("tacoTitle").textContent = "scanning the cosmos for tacos…";
  document.getElementById("tacoMeta").textContent = "";

  // Overpass QL: any node tagged Taco Bell within 25km
  const radius = 25000;
  const q = `
    [out:json][timeout:15];
    (
      node["amenity"="fast_food"]["name"~"^Taco Bell",i](around:${radius},${lat},${lon});
      node["amenity"="fast_food"]["brand"~"^Taco Bell",i](around:${radius},${lat},${lon});
    );
    out tags center;
  `;
  try {
    const resp = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(q),
    });
    if (!resp.ok) throw new Error("overpass " + resp.status);
    const data = await resp.json();
    const nodes = (data.elements || []).filter(e => e.lat && e.lon);
    if (nodes.length === 0) {
      return tacoFail(
        "no taco bell within 25km.<br>" +
        "cosmic sign to make quesadillas at home? 🫶"
      );
    }
    // pick the closest
    nodes.forEach(n => { n._d = haversineKm(lat, lon, n.lat, n.lon); });
    nodes.sort((a, b) => a._d - b._d);
    const closest = nodes[0];
    renderTaco(closest, lat, lon);
  } catch (e) {
    tacoFail("the internet ate your taco bell.<br>try again in a sec.");
  }
}

function renderTaco(node, fromLat, fromLon) {
  const d = node._d;
  const distLabel = d < 1
    ? `${Math.round(d * 1000)} m away`
    : `${d.toFixed(1)} km away`;

  const dLat = node.lat;
  const dLon = node.lon;
  const mapsHref = `https://www.google.com/maps/dir/?api=1&destination=${dLat},${dLon}&travelmode=driving`;
  const appleHref = `http://maps.apple.com/?daddr=${dLat},${dLon}`;

  document.getElementById("tacoEmoji").textContent = "🌮";
  document.getElementById("tacoTitle").innerHTML =
    `your nearest taco bell is <b>${distLabel}</b>`;
  document.getElementById("tacoMeta").innerHTML =
    (node.tags && node.tags["addr:street"])
      ? `${node.tags["addr:housenumber"] || ""} ${node.tags["addr:street"]}`
      : "address unknown — let your phone navigate";

  const isApple = /iPad|iPhone|iPod|Macintosh/.test(navigator.userAgent);
  const primary = isApple ? appleHref : mapsHref;
  const primaryLabel = isApple ? "open in maps 🗺️" : "open in google maps 🗺️";

  document.getElementById("tacoActions").innerHTML = `
    <a class="btn taco" href="${primary}" target="_blank" rel="noopener">${primaryLabel}</a>
    <button class="btn" onclick="findTacoBell()">find another one 🔁</button>
  `;
  burstConfetti();
}

function tacoFail(htmlMsg) {
  document.getElementById("tacoEmoji").textContent = "🙃";
  document.getElementById("tacoTitle").innerHTML = htmlMsg;
  document.getElementById("tacoMeta").textContent = "";
  document.getElementById("tacoActions").innerHTML =
    `<button class="btn" onclick="findTacoBell()">try again 🔁</button>`;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

/* ---------- confetti ---------- */
const COLORS = ["#ff6fa3", "#ff8559", "#b06bff", "#87dafe", "#fff7a8", "#fff"];
function burstConfetti() {
  const wrap = document.getElementById("confettiWrap");
  for (let i = 0; i < 40; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    c.style.animationDuration = (1.6 + Math.random() * 1.4) + "s";
    c.style.animationDelay = Math.random() * 0.2 + "s";
    wrap.appendChild(c);
    setTimeout(() => c.remove(), 3200);
  }
}
</script>
</body>
</html>
